<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Terpadu | Jaspel RSUD</title>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .hospital-logo { font-size: 50px; margin-bottom: 10px; }
        h2 { color: #2d3436; margin-bottom: 5px; font-size: 22px; }
        p { color: #636e72; font-size: 14px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #2d3436; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #0984e3; box-shadow: 0 0 0 3px rgba(9, 132, 227, 0.1); }
        .btn-login { width: 100%; padding: 12px; background: #0984e3; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { background: #074b83; transform: translateY(-1px); }
        .error-msg { color: #d63031; font-size: 13px; margin-top: 15px; display: none; }
        .footer { margin-top: 30px; font-size: 11px; color: #b2bec3; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="hospital-logo">🏥</div>
    <h2>Portal Jaspel RSUD</h2>
    <p>Silakan masuk untuk mengakses sistem</p>

    <div class="form-group">
        <label>Nama Pengguna / Email</label>
        <input type="text" id="username" placeholder="Masukkan username...">
    </div>

    <div class="form-group">
        <label>Kata Sandi</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn-login" onclick="handleLogin()">Masuk ke Sistem</button>
    
    <div id="error" class="error-msg">❌ Username atau password salah!</div>

    <div class="footer">
        © 2026 RSUD Management System <br>
        Sistem Informasi Jasa Pelayanan Terpadu
    </div>
</div>

<script>
    // Data akun simulasi sesuai hak akses yang kita buat
    const users = [
        { user: "admin", pass: "admin123", role: "admin" },
        { user: "direktur", pass: "dir123", role: "direksi" },
        { user: "keuangan", pass: "keu123", role: "keuangan" },
        { user: "operator", pass: "op123", role: "operator" }
    ];

    async function handleLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const err = document.getElementById('error');

        // Validasi Sederhana
        const found = users.find(x => x.user === u && x.pass === p);

        if (found) {
            // 1. Simpan Role ke LocalStorage (Agar Navbar menyesuaikan)
            localStorage.setItem("userRole", found.role);
            localStorage.setItem("userName", found.user);

            // 2. Redirect ke halaman utama (Dashboard)
            // Sesuaikan redirect ini ke halaman awal yang Anda inginkan untuk masing-masing role
            if (found.role === "direksi") {
                window.location.href = "dashboard.html";
            } else if (found.role === "operator") {
                window.location.href = "entry_massal.html";
            } else {
                window.location.href = "admin_pasien.html";
            }
        } else {
            err.style.display = "block";
            setTimeout(() => { err.style.display = "none"; }, 3000);
        }
    }

    // Tekan Enter untuk login
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
</script>

</body>
</html>
