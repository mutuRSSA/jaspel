<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda | Sistem Jaspel RSUD</title>
    <script src="config.js"></script>
    <script>
        // Proteksi Halaman: Cek apakah user sudah login
        if (!localStorage.getItem("userRole")) {
            window.location.href = "login.html";
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .welcome-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .user-avatar { font-size: 60px; margin-bottom: 15px; }
        h1 { color: #2d3436; margin-bottom: 10px; }
        p.subtitle { color: #636e72; font-size: 16px; margin-bottom: 30px; }
        
        .role-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; text-transform: uppercase; margin-bottom: 20px; }
        .role-admin { background: #ffeaa7; color: #d63031; }
        .role-direksi { background: #fab1a0; color: #e17055; }
        .role-keuangan { background: #74b9ff; color: #0984e3; }
        .role-operator { background: #55efc4; color: #00b894; }

        .quick-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .action-card { background: white; padding: 20px; border-radius: 10px; text-decoration: none; color: #333; transition: 0.3s; border: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .action-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: #007bff; }
        .icon { font-size: 30px; }
        .info h4 { margin: 0 0 5px 0; color: #007bff; }
        .info p { margin: 0; font-size: 12px; color: #666; }
    </style>
</head>
<body>

<script>renderNavbar();</script>

<div class="container">
    <div class="welcome-card">
        <div class="user-avatar">👨‍⚕️</div>
        <h1>Selamat Datang, <span id="displayUser">User</span>!</h1>
        <div id="roleBadge" class="role-badge">Role</div>
        <p class="subtitle">Anda masuk ke dalam Sistem Informasi Manajemen Jasa Pelayanan RSUD. Gunakan menu navigasi di atas untuk mulai mengelola data.</p>

        <div class="quick-actions" id="quickActions">
            </div>
    </div>
</div>

<script>
    const role = localStorage.getItem("userRole");
    const user = localStorage.getItem("userName");
    
    document.getElementById('displayUser').innerText = user.charAt(0).toUpperCase() + user.slice(1);
    const badge = document.getElementById('roleBadge');
    badge.innerText = role;
    badge.classList.add('role-' + role);

    // Render Menu Cepat Berdasarkan Role
    const actionContainer = document.getElementById('quickActions');
    let actionsHtml = "";

    if (role === "admin" || role === "operator") {
        actionsHtml += `
            <a href="entry_massal.html" class="action-card">
                <div class="icon">📥</div>
                <div class="info"><h4>Entry Massal</h4><p>Input data pasien dari Excel</p></div>
            </a>
            <a href="admin_pasien.html" class="action-card">
                <div class="icon">🏥</div>
                <div class="info"><h4>Database Pasien</h4><p>Cek status & nominal klaim</p></div>
            </a>`;
    }

    if (role === "admin" || role === "keuangan") {
        actionsHtml += `
            <a href="karyawan.html" class="action-card">
                <div class="icon">👥</div>
                <div class="info"><h4>Data Karyawan</h4><p>Kelola indeks & produktivitas</p></div>
            </a>
            <a href="log_audit.html" class="action-card">
                <div class="icon">🛡️</div>
                <div class="info"><h4>Jejak Audit</h4><p>Pantau keamanan transaksi data</p></div>
            </a>`;
    }

    if (role === "admin" || role === "direksi") {
        actionsHtml += `
            <a href="dashboard.html" class="action-card">
                <div class="icon">📊</div>
                <div class="info"><h4>Dashboard Analitik</h4><p>Pantau tren pendapatan RS</p></div>
            </a>`;
    }

    actionContainer.innerHTML = actionsHtml;
</script>

</body>
</html>
