<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Eksekutif Jaspel</title>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; margin: 0; color: #333; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px;}
        h2 { margin: 0; color: #004085; }
        
        .controls { display: flex; gap: 15px; align-items: center; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-weight: bold; font-size: 14px; outline: none;}
        
        /* Grid untuk Kartu Ringkasan */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center; border-left: 5px solid #007bff;}
        .card.red { border-left-color: #dc3545; }
        .card.green { border-left-color: #28a745; }
        .card.purple { border-left-color: #6f42c1; }
        
        .card-title { font-size: 13px; color: #6c757d; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        .card-value { font-size: 26px; font-weight: bold; color: #333; }
        
        /* Grid untuk Grafik */
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 20px;}
        .chart-full { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); height: 400px; margin-bottom: 40px;}
        .chart-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; height: 350px; }
        .chart-header { font-size: 16px; font-weight: bold; color: #495057; margin-bottom: 15px; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .btn-refresh { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-refresh:hover { background: #0056b3; }
        
        #loadingOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index: 1000; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>
<script>
    // Proteksi Halaman: Cek apakah user sudah login
    if (!localStorage.getItem("userRole")) {
        window.location.href = "login.html"; // Tendang balik ke login jika belum ada role
    }
</script>
<script>renderNavbar();</script> 

<div id="loadingOverlay">Menganalisis Data... ⏳</div>

<div class="header">
    <h2>📊 Dashboard Eksekutif Jaspel</h2>
    <div class="controls">
        <select id="filterBulan" onchange="muatDataDashboard()">
            <option value="Semua">Tampilkan Semua Bulan (Overall)</option>
            <option value="Januari">Januari</option>
            <option value="Februari">Februari</option>
            <option value="Maret">Maret</option>
            <option value="April">April</option>
            <option value="Mei">Mei</option>
            <option value="Juni">Juni</option>
            <option value="Juli">Juli</option>
            <option value="Agustus">Agustus</option>
            <option value="September">September</option>
            <option value="Oktober">Oktober</option>
            <option value="November">November</option>
            <option value="Desember">Desember</option>
        </select>
        <button class="btn-refresh" onclick="muatDataDashboard()" id="btnRefresh">🔄 Segarkan</button>
        <button class="btn-refresh" style="background:#6f42c1;" onclick="prosesCetakPDF()">
            🖨️ Cetak Slip PDF
        </button>
    </div>
</div>

<div class="summary-grid">
    <div class="card green">
        <div class="card-title">✅ Pendapatan (Klaim Disetujui)</div>
        <div class="card-value" id="valKlaim" style="color:#28a745;">Rp 0</div>
    </div>
    <div class="card">
        <div class="card-title">👥 Volume Pasien Terdaftar</div>
        <div class="card-value" id="valPasien">0 Pasien</div>
    </div>
    <div class="card red">
        <div class="card-title">⚠️ Total Potongan VPK</div>
        <div class="card-value" id="valVPK" style="color:#dc3545;">Rp 0</div>
    </div>
    <div class="card purple">
        <div class="card-title">💰 Estimasi Jaspel (40%)</div>
        <div class="card-value" id="valJaspel" style="color: #6f42c1;">Rp 0</div>
    </div>
</div>

<div class="chart-full">
    <div class="chart-header">📈 Tren Pendapatan vs Distribusi Jaspel Bulanan</div>
    <canvas id="trendChart"></canvas>
</div>

<div class="chart-grid">
    <div class="chart-container">
        <div class="chart-header">Rasio Efektivitas Klaim Pasien</div>
        <canvas id="rasioKlaimChart"></canvas>
    </div>
    <div class="chart-container">
        <div class="chart-header">Analisis Sumber Pendapatan (Disetujui)</div>
        <canvas id="sumberDanaChart"></canvas>
    </div>
</div>

<script>
    let rasioChartInst, sumberChartInst, trendChartInst;

    // Urutan bulan baku untuk mengurutkan grafik
    const urutanBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

    const formatRupiah = (angka) => {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
    };

    async function muatDataDashboard() {
        document.getElementById('loadingOverlay').style.display = 'flex';
        const btn = document.getElementById('btnRefresh');
        const fBulan = document.getElementById('filterBulan').value;
        btn.disabled = true;

        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "get_summary", filter_bulan: fBulan })
            });
            const res = await response.json();

            if (res.status === "success") {
                renderDashboard(res.data);
            } else {
                alert("Gagal memuat data: " + res.message);
            }
        } catch (e) {
            alert("Error koneksi saat mengambil data dashboard.");
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
            btn.disabled = false;
        }
    }

    function renderDashboard(data) {
        // 1. Update Kartu Angka
        document.getElementById('valKlaim').innerText = formatRupiah(data.totalKlaim);
        document.getElementById('valPasien').innerText = data.totalPasien + " Orang";
        document.getElementById('valVPK').innerText = formatRupiah(data.totalVPK);
        document.getElementById('valJaspel').innerText = formatRupiah(data.totalJaspel); 

        // 2. Render Grafik Tren Garis (Selalu tampil semua bulan yang tersedia)
        let dataBulan = Object.keys(data.trendBulanan);
        // Urutkan bulan secara kronologis (Jan, Feb, Mar, dst)
        dataBulan.sort((a, b) => urutanBulan.indexOf(a) - urutanBulan.indexOf(b));
        
        let arrayKlaim = dataBulan.map(b => data.trendBulanan[b].klaim);
        let arrayJaspel = dataBulan.map(b => data.trendBulanan[b].jaspel);

        const ctxTrend = document.getElementById('trendChart').getContext('2d');
        if (trendChartInst) trendChartInst.destroy();
        trendChartInst = new Chart(ctxTrend, {
            type: 'line',
            data: {
                labels: dataBulan.length > 0 ? dataBulan : ['Belum Ada Data'],
                datasets: [
                    {
                        label: 'Pendapatan (Klaim Disetujui)',
                        data: arrayKlaim,
                        borderColor: '#28a745',
                        backgroundColor: 'rgba(40, 167, 69, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.3 // Membuat garis melengkung halus
                    },
                    {
                        label: 'Estimasi Jaspel Dibagikan',
                        data: arrayJaspel,
                        borderColor: '#6f42c1',
                        backgroundColor: 'rgba(111, 66, 193, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                if(value >= 1000000) return 'Rp ' + (value / 1000000) + ' Jt';
                                return value;
                            }
                        }
                    }
                },
                plugins: {
                    legend: { position: 'top' },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + formatRupiah(context.raw);
                            }
                        }
                    }
                }
            }
        });

        // 3. Render Grafik Lingkaran (Rasio Klaim)
        const ctxRasio = document.getElementById('rasioKlaimChart').getContext('2d');
        if (rasioChartInst) rasioChartInst.destroy();
        rasioChartInst = new Chart(ctxRasio, {
            type: 'doughnut',
            data: {
                labels: ['Disetujui', 'Pending', 'VPK', 'Tidak Layak'],
                datasets: [{
                    data: [
                        data.rasioKlaim.disetujui, 
                        data.rasioKlaim.pending, 
                        data.rasioKlaim.vpk, 
                        data.rasioKlaim.tidakLayak
                    ],
                    backgroundColor: ['#28a745', '#ffc107', '#17a2b8', '#dc3545'],
                    borderWidth: 2,
                    hoverOffset: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } }
            }
        });

        // 4. Render Grafik Batang (Sumber Dana)
        const ctxSumber = document.getElementById('sumberDanaChart').getContext('2d');
        if (sumberChartInst) sumberChartInst.destroy();
        sumberChartInst = new Chart(ctxSumber, {
            type: 'bar',
            data: {
                labels: ['BPJS', 'UMUM / ASURANSI'],
                datasets: [{
                    label: 'Total Nominal (Rp)',
                    data: [data.sumberDana.bpjs, data.sumberDana.umum],
                    backgroundColor: ['#007bff', '#fd7e14'],
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                if(value >= 1000000) return 'Rp ' + (value / 1000000) + ' Jt';
                                return value;
                            }
                        }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) { return formatRupiah(context.raw); }
                        }
                    }
                }
            }
        });
    }

    // Jalankan saat pertama kali halaman dibuka
    window.onload = muatDataDashboard;

    async function prosesCetakPDF() {
        // Meminta admin mengetik periode secara spesifik agar tidak salah cetak
        const periodeTarget = prompt("Masukkan Periode Jaspel yang ingin dicetak PDF-nya.\n\n(PENTING: Ketik persis seperti teks yang ada di kolom Periode pada sheet Arsip_Karyawan, contoh: 2025-12-01 atau Januari 2026)");
        
        if (!periodeTarget || periodeTarget.trim() === "") {
            return; // Batal jika kosong
        }

        if (!confirm(`Sistem akan mencetak PDF Slip Jaspel untuk periode "${periodeTarget}". \nProses ini berjalan di latar belakang dan mungkin memakan waktu 1-3 menit tergantung jumlah karyawan. Lanjutkan?`)) return;

        // Tampilkan layar loading
        const loading = document.getElementById('loadingOverlay');
        loading.innerText = "🖨️ Sedang Mencetak PDF ke Google Drive... Mohon Tunggu...";
        loading.style.display = 'flex';

        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "cetak_pdf", periode: periodeTarget.trim() })
            });
            const res = await response.json();
            
            if (res.status === "success") {
                alert("✅ " + res.message + "\n\nSilakan buka folder 'Arsip PDF' di Google Drive Anda untuk melihat hasilnya.");
            } else {
                alert("❌ " + res.message);
            }
        } catch (e) {
            alert("Error koneksi saat meminta server mencetak PDF.");
        } finally {
            // Kembalikan teks loading seperti semula dan sembunyikan
            loading.innerText = "Menganalisis Data... ⏳";
            loading.style.display = 'none';
        }
    }
</script>
</body>
</html>
