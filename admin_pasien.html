<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Database Rekam Medis & Jaspel</title>
    <script>
        if (!localStorage.getItem("userRole")) { window.location.href = "login.html"; }
    </script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; font-size: 13px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 98%; margin: 10px auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .controls-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .controls-group { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        input[type="text"], select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; vertical-align: top; }
        th { background: #007bff; color: white; cursor: pointer; }
        .btn { padding: 6px 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px; margin-right: 4px; }
        .btn-refresh { background: #28a745; color: white; padding: 8px 15px; }
        .btn-jaspel { background: #ffc107; color: black; }
        .btn-medis { background: #17a2b8; color: white; }
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; }
        .modal-content { background:white; width: 400px; margin: 40px auto; padding: 25px; border-radius:8px; }
        #bulkActionContainer { display: none; background: #cce5ff; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #b8daff; align-items: center; justify-content: space-between;}
    </style>
</head>
<body>
<script>renderNavbar();</script>

<div class="card">
    <div class="header">
        <h2 style="margin:0;">📂 Database Rekam Medis & Jaspel</h2>
        <button class="btn btn-refresh" onclick="window.location.href='entry_massal.html'">📥 Entry Massal</button>
    </div>

    <div id="bulkActionContainer">
        <div><strong>☑️ <span id="selectedCountText">0</span> Pasien dipilih</strong></div>
        <button class="btn" style="background:#004085; color:white; padding:8px;" onclick="prosesBulkJasa()">✅ Tandai Terbayarkan</button>
    </div>

    <div class="controls-container">
        <div class="controls-group">
            <select id="limitData" onchange="resetPaginationAndRender()">
                <option value="50">50 Baris</option><option value="100">100 Baris</option><option value="All">Semua</option>
            </select>
            <label><input type="checkbox" id="hidePaid" onchange="resetPaginationAndRender()" checked> Sembunyikan Sudah Bayar</label>
        </div>
        <input type="text" id="search" placeholder="🔍 Cari..." onkeyup="debounceSearch()">
    </div>

    <table>
        <thead>
            <tr>
                <th><input type="checkbox" id="checkAll" onchange="toggleSelectAll()"></th>
                <th>Kode</th>
                <th>Pasien</th>
                <th>Klinis</th>
                <th>Status & Jasa</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="bodyTabel"><tr><td colspan="6">Memuat...</td></tr></tbody>
    </table>
</div>

<div id="modalJaspel" class="modal-overlay">
    <div class="modal-content">
        <h3>💰 Update Status Jaspel</h3>
        <p id="infoPasienJaspel" style="font-weight:bold;"></p>
        <label>Status Klaim:</label>
        <select id="editKlaim" style="width:100%; margin-bottom:10px;" onchange="deteksiStatusVPK()">
            <option value="Pending">Pending</option>
            <option value="Disetujui">Disetujui</option>
            <option value="VPK">VPK</option>
            <option value="Tidak Layak">Tidak Layak</option>
        </select>
        <label>Nominal (Khusus BPJS):</label>
        <input type="number" id="editNominal" style="width:100%; margin-bottom:10px;">
        <label>Status Jasa:</label>
        <select id="editJasa" style="width:100%; margin-bottom:10px;">
            <option value="Draft">Draft</option>
            <option value="Belum dibayarkan">Belum dibayarkan</option>
            <option value="Terbayarkan">Terbayarkan</option>
        </select>
        <button class="btn btn-refresh" style="width:100%; padding:10px;" onclick="simpanJaspel()">💾 Simpan</button>
        <button id="btnKoreksiVPK" class="btn" style="width:100%; padding:10px; margin-top:5px; background:#17a2b8; color:white; display:none;" onclick="prosesKoreksiVPK()">🔄 Koreksi VPK</button>
        <button class="btn" style="width:100%; padding:10px; margin-top:5px; background:#ddd;" onclick="tutupModal('modalJaspel')">Batal</button>
    </div>
</div>

<script>
    let dataPasienOriginal = [], dataFiltered = [], currentPage = 1, selectedKode = "";
    
    async function loadData() {
        try {
            const response = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "get_pasien" }) });
            const res = await response.json();
            dataPasienOriginal = res.data;
            resetPaginationAndRender();
        } catch (e) { alert("Error"); }
    }

    function applyFilterAndSort() {
        const txt = document.getElementById('search').value.toLowerCase();
        const hidePaid = document.getElementById('hidePaid').checked;
        dataFiltered = dataPasienOriginal.filter(p => {
            const match = p.nama.toLowerCase().includes(txt) || p.kode_no.toLowerCase().includes(txt);
            const paid = hidePaid ? p.status_jasa !== "Terbayarkan" : true;
            return match && paid;
        });
    }

    function resetPaginationAndRender() { currentPage = 1; applyFilterAndSort(); renderTable(); }
    
    function renderTable() {
        const body = document.getElementById('bodyTabel');
        body.innerHTML = dataFiltered.map(p => `
            <tr>
                <td><input type="checkbox" class="check-item" value="${p.kode_no}" data-sheet="${p.sheet_asal}" onchange="updateBulkUI()"></td>
                <td>${p.kode_no}</td>
                <td>${p.nama}</td>
                <td>${p.data_medis.DOKTER || '-'}</td>
                <td><b>${p.status_klaim}</b><br><small>${p.status_jasa}</small></td>
                <td><button class="btn btn-jaspel" onclick="bukaModalJaspel('${p.kode_no}')">Edit</button></td>
            </tr>
        `).join('');
    }

    function deteksiStatusVPK() {
        const status = document.getElementById('editKlaim').value;
        document.getElementById('btnKoreksiVPK').style.display = (status === "VPK") ? "block" : "none";
    }

    function bukaModalJaspel(kode) {
        const p = dataPasienOriginal.find(x => x.kode_no === kode);
        selectedKode = kode;
        document.getElementById('infoPasienJaspel').innerText = p.nama;
        document.getElementById('editKlaim').value = p.status_klaim;
        document.getElementById('editJasa').value = p.status_jasa;
        document.getElementById('editNominal').value = p.nominal_cair || 0;
        deteksiStatusVPK();
        document.getElementById('modalJaspel').style.display = 'block';
    }

    async function simpanJaspel() {
        const payload = { action: "update_admin", kode_no: selectedKode, status_klaim: document.getElementById('editKlaim').value, status_jasa: document.getElementById('editJasa').value, nominal_cair: document.getElementById('editNominal').value };
        await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
        tutupModal('modalJaspel'); loadData();
    }

    function tutupModal(id) { document.getElementById(id).style.display = 'none'; }
    function debounceSearch() { applyFilterAndSort(); renderTable(); }
    function toggleSelectAll() {
        const isChecked = document.getElementById('checkAll').checked;
        document.querySelectorAll('.check-item').forEach(cb => cb.checked = isChecked);
        updateBulkUI();
    }
    function updateBulkUI() {
        const checked = document.querySelectorAll('.check-item:checked');
        document.getElementById('bulkActionContainer').style.display = checked.length > 0 ? 'flex' : 'none';
        document.getElementById('selectedCountText').innerText = checked.length;
    }
    window.onload = loadData;
</script>
</body>
</html>
