<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Portal Karyawan - Cek Slip Jaspel</title>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; }
        
        /* Box Login Karyawan */
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 5vh; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { color: #1e3a8a; margin: 0; font-size: 24px; }
        .header p { color: #6b7280; font-size: 14px; margin-top: 5px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #374151; font-size: 14px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; }
        .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #2563eb; color: white; margin-top: 10px; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-back { background: #f3f4f6; color: #4b5563; margin-top: 15px; }
        .btn-back:hover { background: #e5e7eb; }

        /* Area Slip (Disembunyikan awalnya) */
        .slip-area { display: none; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .welcome-text { font-size: 18px; font-weight: bold; color: #111827; margin-bottom: 20px; text-align: center; border-bottom: 2px dashed #e5e7eb; padding-bottom: 15px;}
        
        .slip-card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: #f8fafc; }
        .slip-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #cbd5e1; padding-bottom: 10px; margin-bottom: 10px; }
        .slip-periode { font-weight: bold; color: #0f766e; font-size: 16px; }
        .slip-total { font-weight: bold; color: #b91c1c; font-size: 18px; }
        
        .rincian-row { display: flex; justify-content: space-between; font-size: 14px; color: #475569; margin-bottom: 5px; }
        
        #loading { text-align: center; display: none; font-weight: bold; color: #2563eb; margin-top: 15px; }

        @media print {
            body { background: white; }
            .login-box, .btn-back { display: none !important; }
            .slip-area { box-shadow: none; border: none; }
            .slip-card { page-break-inside: avoid; border: 1px solid black; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Form Login Karyawan -->
    <div class="login-box" id="loginBox">
        <div class="header">
            <h2>🏥 Portal Mandiri Karyawan</h2>
            <p>Cek Rincian Jasa Pelayanan RSUD</p>
        </div>
        
        <div class="form-group">
            <label>Nomor Induk Karyawan (NIK)</label>
            <input type="text" id="inputNik" class="form-control" placeholder="Masukkan NIK Anda" autocomplete="off">
        </div>
        
        <div class="form-group">
            <label>PIN (Nomor Rekening Bank)</label>
            <input type="password" id="inputPin" class="form-control" placeholder="Masukkan Nomor Rekening" autocomplete="off">
            <small style="color: #6b7280; font-size: 12px; margin-top: 5px; display: block;">*Gunakan Nomor Rekening yang terdaftar di Keuangan sebagai PIN Anda.</small>
        </div>

        <button class="btn btn-primary" onclick="cekSlip()">Cari Slip Jaspel 🔍</button>
        <button class="btn btn-back" onclick="window.location.href='login.html'">Kembali ke Login Admin</button>
        <div id="loading">Mencari data di arsip server... ⏳</div>
    </div>

    <!-- Area Menampilkan Slip -->
    <div class="slip-area" id="slipArea">
        <div class="welcome-text" id="namaKaryawanText"></div>
        <div id="daftarSlip"></div>
        <button class="btn btn-primary" onclick="window.print()" style="margin-top: 20px;">🖨️ Cetak / Simpan PDF</button>
        <button class="btn btn-back" onclick="keluarPortal()">Keluar (Selesai)</button>
    </div>
</div>

<script>
    const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(Number(angka) || 0);

    async function cekSlip() {
        const nik = document.getElementById('inputNik').value.trim();
        const pin = document.getElementById('inputPin').value.trim();
        
        if(!nik || !pin) return alert("NIK dan Nomor Rekening wajib diisi!");

        document.getElementById('loading').style.display = 'block';

        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "cek_slip_pribadi", nik: nik, pin: pin })
            });
            const res = await response.json();
            
            if (res.status === "success") {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('slipArea').style.display = 'block';
                document.getElementById('namaKaryawanText').innerText = "Halo, " + res.nama + " 👋";
                
                let htmlSlip = "";
                if(res.data.length === 0) {
                    htmlSlip = "<p style='text-align:center; color:#6b7280;'>Belum ada riwayat pencairan Jaspel untuk Anda.</p>";
                } else {
                    // Balik array agar bulan terbaru di atas
                    res.data.reverse().forEach(slip => {
                        htmlSlip += `
                        <div class="slip-card">
                            <div class="slip-header">
                                <span class="slip-periode">Periode: ${slip.periode}</span>
                                <span class="slip-total">${formatRp(slip.total)}</span>
                            </div>
                            <div class="rincian-row"><span>Jasa Pengelola:</span> <span>${formatRp(slip.pengelola)}</span></div>
                            <div class="rincian-row"><span>Jasa Dokter/Medis:</span> <span>${formatRp(slip.dokter)}</span></div>
                            <div class="rincian-row"><span>Jasa Petugas/Perawat:</span> <span>${formatRp(slip.petugas)}</span></div>
                            <div class="rincian-row"><span>Jasa Tim Jaga:</span> <span>${formatRp(slip.tim)}</span></div>
                            <div class="rincian-row"><span>Jasa JTL/Struktural:</span> <span>${formatRp(slip.jtl)}</span></div>
                        </div>`;
                    });
                }
                document.getElementById('daftarSlip').innerHTML = htmlSlip;

            } else {
                alert("❌ " + res.message);
            }
        } catch (e) {
            alert("Terjadi kesalahan jaringan.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function keluarPortal() {
        document.getElementById('inputNik').value = "";
        document.getElementById('inputPin').value = "";
        document.getElementById('slipArea').style.display = 'none';
        document.getElementById('loginBox').style.display = 'block';
    }
</script>
</body>
</html>
